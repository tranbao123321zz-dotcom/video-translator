
name: Dich Video Ra MP4 Co Phu De.

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Link video (https://vt.tiktok.com/ZSQ9XttTA/)'
        required: true
        type: string
      target_lang:
        description: 'Ngôn ngữ đích (vi, en, ja, zh, ko...)'
        required: false
        default: 'vi'
        type: string

jobs:
  translate_and_burn:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 giờ tối đa
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install openai-whisper requests yt-dlp
          sudo apt update
          sudo apt install -y ffmpeg
      
      - name: Download video
        run: |
          python -c "
import yt_dlp
import sys
url = '${{ github.event.inputs.video_url }}'
print(f'Đang tải: {url}')
ydl_opts = {
    'outtmpl': 'input_video.%(ext)s',
    'quiet': False,
}
try:
    with yt_dlp.YoutubeDL(ydl_opts) as ydl:
        info = ydl.extract_info(url, download=True)
        filename = ydl.prepare_filename(info)
        print(f'Đã tải: {filename}')
except Exception as e:
    print(f'Lỗi tải: {e}')
    sys.exit(1)
"
      
      - name: Find video file
        id: find_video
        run: |
          VIDEO_FILE=$(ls input_video.* 2>/dev/null | head -1)
          if [ -z "$VIDEO_FILE" ]; then
            VIDEO_FILE=$(ls *.mp4 *.mkv *.avi *.mov 2>/dev/null | head -1)
          fi
          echo "video_file=$VIDEO_FILE" >> $GITHUB_OUTPUT
          echo "Tìm thấy: $VIDEO_FILE"
          ls -lh "$VIDEO_FILE"
      
      - name: Transcribe and translate
        run: |
          cat > process.py << 'EOF'
import whisper
import subprocess
import json
import time
import requests
import os

def translate_text(text, target='vi'):
    if not text or text.strip() == '':
        return text
    url = "https://translate.googleapis.com/translate_a/single"
    params = {'client': 'gtx', 'sl': 'auto', 'tl': target, 'dt': 't', 'q': text[:5000]}
    try:
        resp = requests.get(url, params=params, timeout=30)
        data = resp.json()
        return ''.join([item[0] for item in data[0] if item[0]])
    except:
        return text

def format_time(seconds):
    hours = int(seconds // 3600)
    minutes = int((seconds % 3600) // 60)
    secs = int(seconds % 60)
    millis = int((seconds % 1) * 1000)
    return f"{hours:02d}:{minutes:02d}:{secs:02d},{millis:03d}"

video_file = "${{ steps.find_video.outputs.video_file }}"
target_lang = "${{ github.event.inputs.target_lang }}"

print(f"Xử lý video: {video_file}")
print(f"Ngôn ngữ đích: {target_lang}")

# Whisper nhận dạng
print("[1/4] Đang nhận dạng giọng nói...")
model = whisper.load_model("base")
result = model.transcribe(video_file, language=None)

subtitles = []
for seg in result['segments']:
    subtitles.append({
        'index': seg['id'] + 1,
        'start': seg['start'],
        'end': seg['end'],
        'text': seg['text'].strip()
    })
print(f"  Đã nhận dạng {len(subtitles)} dòng")

# Dịch
print("[2/4] Đang dịch...")
translated = []
for i, sub in enumerate(subtitles):
    new_text = translate_text(sub['text'], target_lang)
    translated.append({
        'index': sub['index'],
        'start': sub['start'],
        'end': sub['end'],
        'text': new_text
    })
    if (i+1) % 50 == 0:
        print(f"  Đã dịch: {i+1}/{len(subtitles)}")
    time.sleep(0.1)

# Xuất SRT
srt_path = "subtitle.srt"
with open(srt_path, 'w', encoding='utf-8') as f:
    for sub in translated:
        f.write(f"{sub['index']}\n")
        f.write(f"{format_time(sub['start'])} --> {format_time(sub['end'])}\n")
        f.write(f"{sub['text']}\n\n")
print(f"[3/4] Đã xuất SRT: {srt_path}")

# Ghép phụ đề vào video
print("[4/4] Đang ghép phụ đề vào video...")
output_file = "output_dich.mp4"
style = "FontName=Arial,FontSize=22,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,Alignment=2,MarginV=30"
cmd = [
    'ffmpeg', '-i', video_file,
    '-vf', f"subtitles={srt_path}:force_style='{style}'",
    '-c:v', 'libx264', '-preset', 'fast', '-crf', '23',
    '-c:a', 'copy',
    '-y', output_file
]
subprocess.run(cmd, check=True)
print(f"Hoàn thành! File: {output_file}")
size = os.path.getsize(output_file) / (1024*1024)
print(f"Dung lượng: {size:.1f} MB")
EOF
          python process.py
      
      - name: Upload MP4
        uses: actions/upload-artifact@v4
        with:
          name: video-da-dich
          path: output_dich.mp4
          retention-days: 7
      
      - name: Upload SRT (backup)
        uses: actions/upload-artifact@v4
        with:
          name: phu-de-srt
          path: subtitle.srt
          retention-days: 7
