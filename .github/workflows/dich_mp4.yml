
name: Dich Video Ra MP4

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Link video (YouTube, Google Drive, Facebook)'
        required: true
        type: string

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download video
        run: yt-dlp -o input.mp4 "${{ github.event.inputs.video_url }}"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: video-da-tai
          path: input.mp4
